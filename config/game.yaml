# 游戏初始化配置
total_rounds: 20

# 每种工厂类型对应的公司生成参数
companies:
  # 电子产业链
  - factory_type: "硅矿场"
    count: 2
    initial_cash: 100000
    decision_component: "ai"
  - factory_type: "芯片工厂"
    count: 2
    initial_cash: 200000
    decision_component: "classic"
  - factory_type: "手机工厂"
    count: 2
    initial_cash: 150000
    decision_component: "classic"
  # 纺织产业链
  - factory_type: "棉花农场"
    count: 2
    initial_cash: 80000
    decision_component: "classic"
  - factory_type: "纺织厂"
    count: 2
    initial_cash: 120000
    decision_component: "classic"
  - factory_type: "服装厂"
    count: 2
    initial_cash: 100000
    decision_component: "classic"
  # 食品产业链
  - factory_type: "麦田"
    count: 3
    initial_cash: 60000
    decision_component: "classic"
  - factory_type: "面粉厂"
    count: 2
    initial_cash: 80000
    decision_component: "classic"
  - factory_type: "食品厂"
    count: 2
    initial_cash: 90000
    decision_component: "classic"

# 银行（玩家控制）
banks:
  - name: "银行A"
    initial_cash: 2000000
  - name: "银行B"
    initial_cash: 2000000

# 居民初始现金
folk_initial_cash: 500000

# 破产清算与市场补充
bankruptcy:
  liquidation_factory_rate: 0.5    # 工厂变卖折价率（造价 × 此值）
  min_producers_per_goods: 2       # 每种商品最低存活生产者数量
  new_company_initial_cash: 100000 # 政府新建公司的启动资金
  replenish_decision_component: "classic"  # 市场补充新建公司使用的决策组件
