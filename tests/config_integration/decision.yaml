# 企业决策公式系数配置

# ── 决策一：产品定价 ──
pricing:
  base_profit_margin: 0.2
  profit_focus_coeff: 0.5
  base_raise_rate: 0.1
  risk_raise_coeff: 0.5
  base_cut_rate: 0.1
  concession_coeff: 0.5
  noise_coeff: 0.05

# ── 投资决策 ──
investment:
  investment_threshold: 0.6
  perception_noise_coeff: 0.3
  reserve_coeff: 2.0

# ── 采购偏好 ──
purchase:
  brand_weight_coeff: 0.5

# ── 品牌投入 ──
brand:
  base_ratio: 0.05
  marketing_coeff: 1.0

# ── 科技投入 ──
tech:
  base_ratio: 0.05
  tech_coeff: 1.0
